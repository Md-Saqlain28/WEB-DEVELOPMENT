<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: grey;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background-color: black;
            border-radius: 10px;
            padding: 20px;
            width: 300px;
        }
        h1 {
            background-color: yellowgreen;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 50px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input {
            border-radius: 5px;
            border: solid rgb(247, 103, 103);
            padding: 8px;
            margin-bottom: 15px;
        }
        button {
            padding: 4px;
            border-radius: 5px;
            border: solid red;
            background-color: grey;
        }
        button:hover {
            color: whitesmoke;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>SIGN UP</h1>
        <form>
            <input type="email" name="" id="" placeholder="Email"/>
            <input type="text" name="" id="" placeholder="First name"/>
            <input type="text" name="" id="" placeholder="Second name"/>
            <button type="submit">sign up</button>
        </form>
    </div>
</body>
</html>
