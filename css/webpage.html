<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEBPAGE</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        background-color: rgb(204, 118, 191);
      }
      .carousel-inner .carousel-item img {
        height: 400px;
        object-fit: cover;
      }
      .custom-card {
        background-color: rgb(243, 225, 225);
        border: 2px solid black;
        width: 100%;
        margin-bottom: 20px;
      }
      .custom-card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
      }
      .custom-card .card-body {
        padding: 1rem;
      }
      .custom-card .card-title {
        font-family: Arial, Helvetica, sans-serif;
        color: #1a1a1a;
        margin-top: 5px;
        font-weight: bold;
      }
      .custom-card p {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 0.9rem;
      }
      .custom-card .btn {
        width: 100%;
      }
      .footer {
        background-color: rgb(243, 225, 225);
        border: 2px solid black;
        padding: 10px 0;
        margin-top: 30px;
      }
    </style>
  </head>
  <body>
    <div class="container my-4">
      <div id="carouselExample" class="carousel slide">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="https://images.pexels.com/photos/7775638/pexels-photo-7775638.jpeg"
              class="d-block w-100"
              alt="Placeholder for first slide"
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://images.pexels.com/photos/13847596/pexels-photo-13847596.jpeg"
              class="d-block w-100"
              alt="Placeholder for second slide"
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://images.pexels.com/photos/7775641/pexels-photo-7775641.jpeg"
              class="d-block w-100"
              alt="Placeholder for third slide"
            />
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselExample"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselExample"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    </div>

    <div class="container my-4">
      <div class="row g-4 justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card custom-card">
            <img
              src="https://images.pexels.com/photos/3577561/pexels-photo-3577561.jpeg"
              class="card-img-top"
              alt="A person studying Data Structures with Python"
            />
            <div class="card-body">
              <h5 class="card-title">DSA WITH PYTHON</h5>
              <p class="card-text">MUST WATCH!</p>
              <a href="#" class="btn btn-primary">Watch Now</a>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card custom-card">
            <img
              src="https://images.pexels.com/photos/3561340/pexels-photo-3561340.jpeg"
              class="card-img-top"
              alt="A person studying an Introduction to Python"
            />
            <div class="card-body">
              <h5 class="card-title">INTRO TO PYTHON</h5>
              <p class="card-text">MUST WATCH!</p>
              <a href="#" class="btn btn-primary">Watch Now</a>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card custom-card">
            <img
              src="https://images.pexels.com/photos/18681383/pexels-photo-18681383.jpeg"
              class="card-img-top"
              alt="A person doing Web Development"
            />
            <div class="card-body">
              <h5 class="card-title">WEB DEVELOPMENT</h5>
              <p class="card-text">MUST WATCH!</p>
              <a href="#" class="btn btn-primary">Watch Now</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="container-fluid footer">
      <p class="copy text-center mb-0">COPYRIGHT : MOHAMMED SAQLAIN</p>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
