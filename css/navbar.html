<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar Variations</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0; 
            padding: 20px;
            background-color: #1a1a1a;
            color: #fff;
        }
        .nav-container{
            margin-bottom: 40px;
        }
        h1{
            margin-bottom: 10px;
        }
        .nav1{
            background-color: #eaeaea;
            padding: 1px;
        }
        .nav1 ul{
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: space-around;
        }
        .nav1 li{
            display: inline;
        }
        .nav1 a{
            text-decoration: none;
            color: #212121;
            /* background-color: rgb(225, 95, 2); */
            padding: 5px 15px;
            position: relative;
        }
        
        .nav1 a::after{
            content: "abc";
            position: absolute;
            height: 2px;
            width: 100%;
            bottom: 0;
            left: 0;
            background-color: blue;
            transform: scaleX(0);
            transition: transform 0.3s ease-in-out;
        }
        .nav1 a:hover::after{
            transform: scaleX(1);
        }

        .nav1 .login-btn {
            background-color: #254bf6;
            color: #fff;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .nav1 .login-btn:hover{
            background-color:rgb(4, 4, 158);
            border: 2px solid red;
        }

        .nav2{
            background-color:rgb(5, 82, 39);
            padding: 20px;
            width: 200px;
        }
        .nav2 ul{
            list-style-type: none;
            margin: 0;
            padding:0;
        }
        .nav2 li{
            margin-bottom: 12px;
        }
        .nav2 a{
            text-decoration: none;
            color: #fff;
            display: block;
            padding: 10px;
            width: 100%;
        }
        .nav2 a:hover{
            background-color: rgb(4, 137, 13);
        }
        .nav2 .login-btn{
            background-color: rgb(5, 156, 35);
            color: #fff;
            border: none;
            width: 100%;
            padding: 10px;
            cursor: pointer;
        }
        .nav2 .login-btn:hover{
            background-color: rgb(2, 91, 2);
            border: 1px solid white;
        }

        .nav3{
            background-color: #c20551;
            padding: 10px;
        }
        .nav3 ul{
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav3 a{
            color: #eaeaea;
            text-decoration: none;
            padding: 10px;
            display: block;
        }
        .nav3 a:hover{
            background-color:palevioletred;
        }
        .nav3 .dropdown-content{
            display: none;
        }
        .nav3 .dropdown:hover .dropdown-content{
            display: block;
            position: absolute;
            background-color: #212121;
            min-width: 150px;
        }
        .nav3 .login-btn{
            background-color: #1a1a1a;
            color: #eaeaea;
            border: none;
            padding: 6px;
        }
        .nav3 .login-btn:hover{
            background-color: #1a080f;
            border: 2px solid wheat;
        }

    </style>

</head>
<body>
    <div class="nav container">
        <h1>Variation 1: Horizontal with underline effect</h1>
        <nav class="nav1">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
                <li><button class="login-btn">Login</button></li>
            </ul>
        </nav>
    </div>

    
    <div class="nav container">
        <h1>Variation 2: Vertical with hover effect</h1>
        <nav class="nav2">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
                <li><button class="login-btn">Login</button></li>
            </ul>
        </nav>
    </div>

    <div class="nav container">
        <h1>Variation 2: Horizontal with dropdown</h1>
        <nav class="nav3">
            <ul>
                <li><a href="#">Home</a></li>
                <li class="dropdown">
                    <a href="#">About</a>
                    <div class="dropdown-content">
                        <a href="#">Our Story</a>
                        <a href="#">Team</a>
                        <a href="#">Contact</a>
                    </div>
                </li>
                <li><a href="#">Products</a></li>
                <li><button class="login-btn">Login</button></li>
            </ul>
        </nav>
    </div>
</body>
</html>
