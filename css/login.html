<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: black;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background-color: blueviolet;
            border-radius: 10px;
            padding: 30px;
            width: 300px;
        }
        h1 {
           color:rgb(230, 233, 73); 
           text-align: center;
           margin-bottom: 50px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            background-color:none;
            border: 2px solid black;
        }
        button {
            background-color: rgb(0, 255, 98);
            color:rgb(55, 1, 55) ;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid black;
        }
        button:hover {
            background-color: rgb(2, 107, 34);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>LOGIN</h1>
        <form>
            <input type="email" name="" id="" placeholder="Email"/>
            <input type="password" name="" id="" placeholder="Password"/>
            <button type="submit">login</button>
        </form>
    </div>
</body>
</html>
