<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BREAKPOINT WEB DESIGN</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .responsive-web{
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            color: #fff;
            font-size: 26px;
            background-color: blueviolet;
        }
        @media (max-width: 600px) {
            body{
                align-items: flex-start;
            }
            .responsive-web{
                background-color: blue;
            }
        }
        @media (min-width:601px) and (max-width:1024px){
             body{
                align-items: center
            }
            .responsive-web{
                background-color: red;
            }
        }
    </style>
</head>
<body>
    <div class="responsive-web">
        this is a color changing screen with respect to size.
    </div>
</body>
</html>
